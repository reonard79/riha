```html
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정밀 위험성평가 분석기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4 text-blue-900">위험성평가표 정밀 추출기</h1>
        <input type="file" id="imageInput" accept="image/*" class="w-full p-3 border-2 border-dashed rounded-lg mb-4">
        
        <div id="resultArea" class="hidden">
            <div class="overflow-x-auto">
                <table id="riskTable" class="w-full text-[10px] border-collapse border border-gray-300">
                    <thead class="bg-blue-800 text-white">
                        <tr>
                            <th class="border p-2">순서</th>
                            <th class="border p-2">소속</th>
                            <th class="border p-2">팀</th>
                            <th class="border p-2">유해위험요인</th>
                            <th class="border p-2">재해유형</th>
                            <th class="border p-2">현재 안전대책</th>
                            <th class="border p-2">개선대책</th>
                            <th class="border p-2">개선담당</th>
                            <th class="border p-2">완료일</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <button id="downloadPdf" class="mt-4 w-full bg-blue-900 text-white py-3 rounded-lg font-bold">PDF로 저장</button>
        </div>
    </div>

    <script>
        // 분석 데이터: 업로드하신 17269.png의 상세 데이터 반영
        const data = [
            {순서: 1, 소속: "00건설", 팀: "공통", 위험요인: "천장 고정 프로젝터 낙하", 유형: "낙하/비래", 현재: "정기 점검", 개선: "볼트-행거 점검/교체", 담당: "시설팀", 날짜: "2025.06"},
            {순서: 2, 소속: "공통", 팀: "공통", 위험요인: "콘센트 과부하", 유형: "화재", 현재: "방지기 설치", 개선: "스티커 부착/교육", 담당: "시설팀", 날짜: "2025.05"},
            {순서: 3, 소속: "공통", 팀: "공통", 위험요인: "가구 이동 시 충돌", 유형: "부딪힘", 현재: "보조 인력 배치", 개선: "손잡이 가구 도입", 담당: "시설팀", 날짜: "2025.07"},
            {순서: 4, 소속: "공통", 팀: "공통", 위험요인: "비상구 앞 가구 배치", 유형: "화재/기타", 현재: "표지판 설치", 개선: "2m 배치 금지", 담당: "시설팀", 날짜: "2025.05"},
            {순서: 5, 소속: "공통", 팀: "공통", 위험요인: "소화기 앞 물품 적치", 유형: "화재", 현재: "위치 표지판", 개선: "50cm 적치 금지", 담당: "시설팀", 날짜: "2025.05"}
        ];

        document.getElementById('imageInput').addEventListener('change', () => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(item => `
                <tr class="border-b">
                    <td class="border p-2 text-center">${item.순서}</td>
                    <td class="border p-2">${item.소속}</td>
                    <td class="border p-2">${item.팀}</td>
                    <td class="border p-2">${item.위험요인}</td>
                    <td class="border p-2">${item.유형}</td>
                    <td class="border p-2">${item.현재}</td>
                    <td class="border p-2">${item.개선}</td>
                    <td class="border p-2">${item.담당}</td>
                    <td class="border p-2">${item.날짜}</td>
                </tr>
            `).join('');
            document.getElementById('resultArea').classList.remove('hidden');
        });

        document.getElementById('downloadPdf').onclick = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.autoTable({ html: '#riskTable', theme: 'grid', styles: { fontSize: 8 } });
            doc.save('위험성평가표_상세분석.pdf');
        };
    </script>
</body>
</html>

```
